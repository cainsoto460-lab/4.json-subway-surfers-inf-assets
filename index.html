<base href="https://cdn.jsdelivr.net/gh/cainsoto460-lab/4.json-subway-surfers-inf-assets@main/">
<html>
<head>
    <meta charset="utf-8">
    <title>Subway Surfers</title>
    <style>
        * { margin: 0; padding: 0; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #unity-container { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
        #unity-canvas { width: 960px; height: 600px; }
        #loading-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000; display: flex;
            flex-direction: column;
            align-items: center; justify-content: center;
            color: white; z-index: 999;
        }
        #progress-bar-bg {
            width: 300px; height: 10px;
            background: #333; border-radius: 5px;
            margin-top: 20px; overflow: hidden;
        }
        #progress-bar-fill {
            height: 100%; width: 0%;
            background: #00e5ff;
            border-radius: 5px;
            transition: width 0.2s ease;
        }
        #loading-text { margin-top: 10px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div style="font-size:24px; font-weight:bold;">Subway Surfers</div>
    <div id="progress-bar-bg">
        <div id="progress-bar-fill"></div>
    </div>
    <div id="loading-text">Loading... 0%</div>
</div>

<div id="unity-container">
    <canvas id="unity-canvas"></canvas>
</div>

<script>
    // Kill all ads
    window.PokiSDK = {
        init:                () => Promise.resolve(),
        gameLoadingStart:    () => {},
        gameLoadingProgress: () => {},
        gameLoadingFinished: () => {},
        commercialBreak:     () => Promise.resolve(),
        rewardedBreak:       () => Promise.resolve(true),
        setDebug:            () => {},
        gameplayStart:       () => {},
        gameplayStop:        () => {},
    };

    // Merge split files
    window.mergedBlobUrls = {};
    window.assetsReady = false;

    async function mergeSplitFile(base, parts) {
        const urls = Array.from({length: parts}, (_, i) => `${base}.part${i+1}`);
        const responses = await Promise.all(urls.map(u => fetch(u)));
        if (responses.some(r => !r.ok)) return null;
        const buffers = await Promise.all(responses.map(r => r.arrayBuffer()));
        return URL.createObjectURL(new Blob(buffers, {type: 'application/octet-stream'}));
    }

    function interceptXHR() {
        const origOpen = XMLHttpRequest.prototype.open;
        const origSend = XMLHttpRequest.prototype.send;

        XMLHttpRequest.prototype.open = function(method, url, ...args) {
            let finalUrl = url;
            for (const [name, blob] of Object.entries(window.mergedBlobUrls)) {
                if (url.includes(name)) { finalUrl = blob; break; }
            }
            return origOpen.call(this, method, finalUrl, ...args);
        };

        XMLHttpRequest.prototype.send = function(...args) {
            const xhr = this;
            if (!window.assetsReady) {
                const wait = setInterval(() => {
                    if (window.assetsReady) { clearInterval(wait); origSend.apply(xhr, args); }
                }, 50);
                return;
            }
            return origSend.apply(this, args);
        };
    }

    async function boot() {
        interceptXHR();

        // Merge wasm_code_shared parts
        const wasmBlob = await mergeSplitFile('wasm_code_shared.unityweb', 2);
        if (wasmBlob) window.mergedBlobUrls['wasm_code_shared.unityweb'] = wasmBlob;

        window.assetsReady = true;

        // Load UnityLoader then boot game
        const script = document.createElement('script');
        script.src = 'Unityloader.2019.js';
        script.onload = function() {
            window.unityGame = UnityLoader.instantiate("unity-canvas", "4.json", {
                onProgress: function(instance, progress) {
                    const pct = Math.round(progress * 100);
                    document.getElementById('progress-bar-fill').style.width = pct + '%';
                    document.getElementById('loading-text').innerText = 'Loading... ' + pct + '%';
                    if (progress >= 1) {
                        setTimeout(() => {
                            document.getElementById('loading-screen').style.display = 'none';
                        }, 500);
                    }
                }
            });
        };
        document.body.appendChild(script);
    }

    boot();
</script>
</body>
</html>
